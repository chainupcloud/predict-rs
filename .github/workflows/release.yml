name: Release

on:
  push:
    tags: ["v*"]
  # Build-only test runs — no release is published (see the tag guards below).
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-latest
          # x86_64 Linux builds natively on ubuntu-22.04 (glibc 2.35 floor →
          # runs on Ubuntu 22.04/24.04, Debian 12+). ubuntu-latest (24.04) links
          # glibc 2.38+ and dies on 22.04 (hit live); cross's 20.04 image is out
          # because aws-lc-sys hard-rejects its GCC 9 (memcmp bug 95189).
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          # aarch64 cross-compiles via cross (its aarch64 toolchain passes
          # aws-lc-sys's compiler check; produces glibc-2.31-compatible binaries).
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"${VERSION}\"/" cli/Cargo.toml

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p predict-cli --target ${{ matrix.target }}
          else
            cargo build --release -p predict-cli --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../predict-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz predict-cli
          cd ../../..

      - uses: actions/upload-artifact@v5
        with:
          name: predict-cli-${{ matrix.target }}
          path: predict-cli-*.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum predict-cli-*.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            predict-cli-*.tar.gz
            checksums.txt
