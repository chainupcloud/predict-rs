name: Release

on:
  push:
    tags: ["v*"]
  # Build-only test runs — no release is published (see the tag guards below).
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-latest
          # Both Linux targets build via cross: its ubuntu-20.04-based images link
          # against glibc 2.31, so binaries run on Ubuntu 20.04 / 22.04 / 24.04.
          # A native ubuntu-latest build links glibc 2.38+ and dies with
          # "version `GLIBC_2.38' not found" on older distros (hit live on 22.04).
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"${VERSION}\"/" cli/Cargo.toml

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p predict-cli --target ${{ matrix.target }}
          else
            cargo build --release -p predict-cli --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../predict-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz predict-cli
          cd ../../..

      - uses: actions/upload-artifact@v5
        with:
          name: predict-cli-${{ matrix.target }}
          path: predict-cli-*.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum predict-cli-*.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            predict-cli-*.tar.gz
            checksums.txt
