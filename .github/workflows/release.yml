name: Release

on:
  push:
    tags: ["v*"]
  # Build-only test runs — no release is published (see the tag guards below).
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-latest
          # Linux binaries are statically linked against musl so they run on any
          # distro regardless of glibc version (native glibc builds bit us twice:
          # ubuntu-latest links glibc 2.38+ and dies on 22.04; cross's 20.04
          # image has the GCC 9 that aws-lc-sys hard-rejects, memcmp bug 95189).
          # x86_64 builds natively with musl-tools; aarch64 via cross.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl') && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"${VERSION}\"/" cli/Cargo.toml

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p predict-cli --target ${{ matrix.target }}
          else
            cargo build --release -p predict-cli --target ${{ matrix.target }}
          fi

      - name: Assert statically linked (musl)
        if: contains(matrix.target, 'musl')
        run: |
          file target/${{ matrix.target }}/release/predict-cli
          file target/${{ matrix.target }}/release/predict-cli | grep -Eq 'static(-pie)? linked|statically linked'

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../predict-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz predict-cli
          cd ../../..

      - uses: actions/upload-artifact@v5
        with:
          name: predict-cli-${{ matrix.target }}
          path: predict-cli-*.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum predict-cli-*.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            predict-cli-*.tar.gz
            checksums.txt
